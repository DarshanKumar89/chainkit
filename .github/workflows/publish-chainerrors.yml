name: Publish chainerrors

on:
  push:
    tags:
      - 'chainerrors-v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (build only, skip all publish steps)'
        required: true
        default: 'true'
        type: choice
        options: ['true', 'false']
      ref:
        description: 'Branch or tag to build from (e.g. main, chainerrors-v0.1.0)'
        required: false
        default: ''

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1: Publish Rust crates to crates.io in dependency order
  #
  #   chainerrors-core
  #     ├─ chainerrors-evm    (depends on chainerrors-core)
  #     └─ chainerrors-solana (depends on chainerrors-core)
  # ─────────────────────────────────────────────────────────────────────────────
  publish-rust:
    name: Publish Rust crates to crates.io
    runs-on: ubuntu-latest
    environment: Prod
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-publish-chainerrors-${{ hashFiles('chainerrors/Cargo.lock') }}

      - name: Publish chainerrors-core
        if: github.event.inputs.dry_run != 'true'
        working-directory: chainerrors
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if ! cargo publish -p chainerrors-core 2>&1 | tee /tmp/pub_out; then
            grep -q "already exists" /tmp/pub_out || { cat /tmp/pub_out; exit 1; }
            echo "chainerrors-core already published – skip"
          fi

      - name: Wait for crates.io to index chainerrors-core
        if: github.event.inputs.dry_run != 'true'
        run: sleep 30

      - name: Publish chainerrors-evm
        if: github.event.inputs.dry_run != 'true'
        working-directory: chainerrors
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if ! cargo publish -p chainerrors-evm 2>&1 | tee /tmp/pub_out; then
            grep -q "already exists" /tmp/pub_out || { cat /tmp/pub_out; exit 1; }
            echo "chainerrors-evm already published – skip"
          fi

      - name: Publish chainerrors-solana
        if: github.event.inputs.dry_run != 'true'
        working-directory: chainerrors
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if ! cargo publish -p chainerrors-solana 2>&1 | tee /tmp/pub_out; then
            grep -q "already exists" /tmp/pub_out || { cat /tmp/pub_out; exit 1; }
            echo "chainerrors-solana already published – skip"
          fi

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: Build Node.js native .node files for all supported platforms
  # ─────────────────────────────────────────────────────────────────────────────
  build-node-bindings:
    name: Build Node bindings · ${{ matrix.settings.name }}
    runs-on: ${{ matrix.settings.host }}
    strategy:
      fail-fast: false
      matrix:
        settings:
          - name: linux-x64-gnu
            host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            build: >
              cd chainerrors/bindings/node &&
              npx napi build --platform --release --target x86_64-unknown-linux-gnu

          - name: linux-x64-musl
            host: ubuntu-latest
            target: x86_64-unknown-linux-musl
            build: |
              sudo apt-get install -y musl-tools
              rustup target add x86_64-unknown-linux-musl
              cd chainerrors/bindings/node
              npx napi build --platform --release --target x86_64-unknown-linux-musl

          - name: linux-arm64-gnu
            host: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            build: |
              sudo apt-get install -y gcc-aarch64-linux-gnu
              rustup target add aarch64-unknown-linux-gnu
              cd chainerrors/bindings/node
              CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc \
                npx napi build --platform --release --target aarch64-unknown-linux-gnu

          - name: macos-x64
            host: macos-latest
            target: x86_64-apple-darwin
            build: |
              rustup target add x86_64-apple-darwin
              cd chainerrors/bindings/node
              RUSTFLAGS="-C link-arg=-undefined -C link-arg=dynamic_lookup" \
                npx napi build --platform --release --target x86_64-apple-darwin

          - name: macos-arm64
            host: macos-latest
            target: aarch64-apple-darwin
            build: |
              rustup target add aarch64-apple-darwin
              cd chainerrors/bindings/node
              RUSTFLAGS="-C link-arg=-undefined -C link-arg=dynamic_lookup" \
                npx napi build --platform --release --target aarch64-apple-darwin

          - name: windows-x64
            host: windows-latest
            target: x86_64-pc-windows-msvc
            build: >
              cd chainerrors/bindings/node &&
              npx napi build --platform --release --target x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: chainerrors/bindings/node/package.json

      - name: Install napi-rs CLI and dependencies
        working-directory: chainerrors/bindings/node
        run: npm install

      - name: Build native module
        shell: bash
        run: ${{ matrix.settings.build }}

      - name: Upload .node artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.settings.name }}
          path: chainerrors/bindings/node/*.node
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 3: Collect all .node files and publish @chainfoundry/chainerrors to npm
  # ─────────────────────────────────────────────────────────────────────────────
  publish-npm:
    name: Publish @chainfoundry/chainerrors to npm
    runs-on: ubuntu-latest
    needs: [build-node-bindings]
    environment: Prod
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Download all platform .node artifacts
        uses: actions/download-artifact@v4
        with:
          path: chainerrors/bindings/node/artifacts

      - name: Move .node files into package root
        working-directory: chainerrors/bindings/node
        run: |
          find artifacts -name '*.node' -exec mv {} . \;
          echo "Collected binaries:"
          ls -la *.node

      - name: Copy README into package
        run: cp chainerrors/README.md chainerrors/bindings/node/README.md

      - name: Install package dependencies
        working-directory: chainerrors/bindings/node
        run: npm install

      - name: Publish to npm
        if: github.event.inputs.dry_run != 'true'
        working-directory: chainerrors/bindings/node
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 4: Build Python wheels for all supported platforms (maturin)
  # ─────────────────────────────────────────────────────────────────────────────
  build-python-wheels:
    name: Build Python wheel · ${{ matrix.platform.name }}
    if: startsWith(github.ref, 'refs/tags/chainerrors-v') || github.event_name == 'workflow_dispatch'
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: linux-x64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: auto

          - name: linux-arm64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            manylinux: auto

          - name: linux-x64-musl
            runner: ubuntu-latest
            target: x86_64-unknown-linux-musl
            manylinux: musllinux_1_1

          - name: macos-x64
            runner: macos-latest
            target: x86_64-apple-darwin
            manylinux: ''

          - name: macos-arm64
            runner: macos-latest
            target: aarch64-apple-darwin
            manylinux: ''

          - name: windows-x64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            manylinux: ''

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install maturin
        run: pip install maturin

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}

      - name: Build wheels (Linux manylinux via docker)
        if: runner.os == 'Linux' && matrix.platform.manylinux != 'musllinux_1_1'
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          manylinux: ${{ matrix.platform.manylinux }}
          working-directory: chainerrors/bindings/python
          args: --release --out dist
          sccache: true

      - name: Build wheels (Linux musl — direct maturin, no Docker)
        if: runner.os == 'Linux' && matrix.platform.manylinux == 'musllinux_1_1'
        working-directory: chainerrors/bindings/python
        run: |
          sudo apt-get update -q && sudo apt-get install -y -q musl-tools
          rustup target add x86_64-unknown-linux-musl
          maturin build --release --out dist --target x86_64-unknown-linux-musl --find-interpreter

      - name: Build wheels (macOS / Windows — native)
        if: runner.os != 'Linux'
        shell: bash
        run: |
          maturin build --release --out dist \
            --manifest-path chainerrors/bindings/python/Cargo.toml \
            --target ${{ matrix.platform.target }}

      - name: Upload wheel artifact (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: python-wheel-${{ matrix.platform.name }}
          path: chainerrors/bindings/python/dist/*.whl
          if-no-files-found: error

      - name: Upload wheel artifact (macOS / Windows)
        if: runner.os != 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: python-wheel-${{ matrix.platform.name }}
          path: dist/*.whl
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 5: Publish Python wheels to PyPI (OIDC trusted publishing)
  # ─────────────────────────────────────────────────────────────────────────────
  publish-pypi:
    name: Publish chainerrors to PyPI
    runs-on: ubuntu-latest
    if: ${{ !cancelled() && (startsWith(github.ref, 'refs/tags/chainerrors-v') || github.event_name == 'workflow_dispatch') }}
    needs: [build-python-wheels]
    environment:
      name: pypi
      url: https://pypi.org/p/chainerrors
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install maturin and twine
        run: pip install maturin twine

      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: python-wheel-*
          path: dist
          merge-multiple: true

      - name: List wheels
        run: ls -la dist/

      - name: Publish to PyPI via OIDC trusted publishing
        if: github.event.inputs.dry_run != 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 6: Create a GitHub Release
  # ─────────────────────────────────────────────────────────────────────────────
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    if: ${{ !cancelled() }}
    needs: [publish-rust, publish-npm, publish-pypi]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          if [[ "$GITHUB_REF_NAME" == chainerrors-v* ]]; then
            echo "version=${GITHUB_REF_NAME#chainerrors-v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.0.0-manual" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: chainerrors v${{ steps.version.outputs.version }}
          generate_release_notes: true
          draft: false
          prerelease: false
          body: |
            ## chainerrors v${{ steps.version.outputs.version }}

            Blockchain error decoder for EVM and Solana — decode reverts, panics,
            custom errors, and program failures.

            ### Install

            **Rust (Cargo.toml)**
            ```toml
            [dependencies]
            chainerrors-core   = "${{ steps.version.outputs.version }}"
            chainerrors-evm    = "${{ steps.version.outputs.version }}"
            chainerrors-solana = "${{ steps.version.outputs.version }}"
            ```

            **npm / Node.js**
            ```bash
            npm install @chainfoundry/chainerrors
            ```

            **Python (pip)**
            ```bash
            pip install chainerrors
            ```

            ### Published crates

            | Crate | crates.io |
            |-------|-----------|
            | chainerrors-core | https://crates.io/crates/chainerrors-core |
            | chainerrors-evm | https://crates.io/crates/chainerrors-evm |
            | chainerrors-solana | https://crates.io/crates/chainerrors-solana |

            **npm:** https://www.npmjs.com/package/@chainfoundry/chainerrors
            **PyPI:** https://pypi.org/project/chainerrors/
